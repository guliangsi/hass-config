name: Home Assistant CI

on:
  push:
    # Exclut la branche main
    branches-ignore:
      - main
  pull_request:
    # Exclut la branche main
    branches-ignore:
      - main

jobs:
  test-config:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read Home Assistant version
        run: echo "HA_VERSION=$(cat .HA_VERSION)" >> $GITHUB_ENV
      
      - name: Prepare CI environment
        run: |
          mkdir -p ssl
          mkdir -p tmp
      
          # fake ssl certs
          touch ssl/fullchain.pem
          touch ssl/privkey.pem
      
          echo "# generated by CI" > secrets.yaml
      
          for secret in $(grep -rhoP '!secret\s+\K\w+' . --exclude-dir=.git --exclude-dir=.storage | sort -u); do
            case $secret in
      
              allowlist_external_dirs)
                echo "$secret: /tmp" >> secrets.yaml
                ;;
      
              external_url|internal_url|base_url)
                echo "$secret: 'http://localhost'" >> secrets.yaml
                ;;
      
              influxdb_port)
                echo "$secret: 8086" >> secrets.yaml
                ;;
      
              influxdb_host)
                echo "$secret: localhost" >> secrets.yaml
                ;;
      
              ssl_certificate)
                echo "$secret: /config/ssl/fullchain.pem" >> secrets.yaml
                ;;
      
              ssl_key)
                echo "$secret: /config/ssl/privkey.pem" >> secrets.yaml
                ;;
      
              *_ip)
                # met une IP valide factice
                echo "$secret: 127.0.0.1" >> secrets.yaml
                ;;
      
              home_lat)
                echo "$secret: 32.400394" >> secrets.yaml
                ;;
      
              home_lon)
                echo "$secret: -0.123335" >> secrets.yaml
                ;;
      
              home_radius)
                echo "$secret: 250" >> secrets.yaml
                ;;
      
              telegram_chatid)
                echo "$secret: 1234567890" >> secrets.yaml
                ;;
      
              *_port)
                echo "$secret: 1234" >> secrets.yaml
                ;;
      
              *_url)
                echo "$secret: 'http://example.com'" >> secrets.yaml
                ;;
      
              *_dir)
                echo "$secret: '/tmp'" >> secrets.yaml
                ;;
      
              *)
                echo "$secret: 'dummy_value'" >> secrets.yaml
                ;;
            esac
          done
          
      - name: Check Home Assistant config
        run: |
          docker run \
            -v $(pwd):/config \
            -v $(pwd)/ssl:/ssl \
            -v $(pwd)/tmp:/tmp \
            ghcr.io/home-assistant/home-assistant:${{ env.HA_VERSION }} \
            python -m homeassistant --script check_config --config /config
