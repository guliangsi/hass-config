name: Deploy Home Assistant

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  deploy:
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Snapshot VM
        run: |
          SNAP="gitops-$(date +%s)"
          
          curl -k -v -X POST \
          "https://${{ secrets.PROXMOX_HOST }}:8006/api2/json/nodes/proxmox/qemu/${{ secrets.PROXMOX_VM_ID }}/snapshot" \
          -H 'Authorization: PVEAPIToken=${{ secrets.PROXMOX_TOKEN_ID }}=${{ secrets.PROXMOX_TOKEN_SECRET }}' \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "snapname=$SNAP"
  
      - name: Trigger Home Assistant
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"event_type":"github_pull_config"}' \
            https://domotique.desbois.dev:8123/api/events/github_pull_config
