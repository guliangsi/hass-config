                      grid:
                        - grid-template-areas: |
                            "icon  circle"
                            "n     n"
                            "s     s"
                        - grid-template-columns: repeat(2, 1fr)
                        - grid-template-rows: auto repeat(2, min-content)
                        - gap: 1.3%
                        - align-items: start
                        - will-change: transform
                      name:
                        - justify-self: start
                        - line-height: 121%
                        - font-size: var(--button-card-font-size);
                        - font-weight: var(--button-card-font-weight);
                        - letter-spacing: var(--button-card-letter-spacing);
                      state:
                        - justify-self: start
                        - line-height: 115%
                        - font-size: var(--button-card-font-size);
                        - font-weight: var(--button-card-font-weight);
                        - letter-spacing: var(--button-card-letter-spacing);
                      card:
                        - padding: 10.9% 9.9% 8.9% 10.9%;
                        - border-radius: var(--button-card-border-radius)
                        - border-width: 0
                        - -webkit-tap-highlight-color: rgba(0,0,0,0)
                        - transition: none
                        - --mdc-ripple-color: >
                            [[[
                              return variables.state_on
                                  ? 'rgb(0, 0, 0)'
                                  : '#97989c';
                            ]]]
                        - color: >
                            [[[
                              return variables.state_on
                                  ? '#4b5254'
                                  : '#97989c';
                            ]]]
                        - background-color: >
                            [[[
                              return variables.state_on
                                  ? 'rgba(255, 255, 255, 0.85)'
                                  : 'rgba(115, 115, 115, 0.25)';
                            ]]]
              
                  - type: "custom:button-card"
                    entity: sensor.next_poubelle
                    show_entity_picture: false
                    show_state: false
                    show_name: true
                    show_icon: false
                    name: Portails
                    aspect_ratio: 1/1
                    custom_fields:
                      icon: <ha-icon icon='mdi:garage-variant'></ha-icon>
                    tap_action:
                      action: call-service
                      service: honeycomb
                      service_data:
                        size: 500
                        spacing: 10
                        autoclose: true
                        buttons:
                          - icon: mdi:garage-variant
                            color_type: card
                            color: grey
                            styles:
                              icon:
                                - width: 50%
                            active: false
                            tap_action:
                              action: call-service
                              service: switch.turn_on
                              data: {}
                              target:
                                entity_id: switch.ipx_ndeg0_relais_1
                          - icon: mdi:gate
                            color_type: card
                            color: grey
                            styles:
                              icon:
                                - width: 50%
                            active: true
                            tap_action:
                              action: call-service
                              service: switch.turn_on
                              data: {}
                              target:
                                entity_id: switch.ipx_ndeg0_relais_2            
                    styles:
                      container: 
                        - text-align: left !important;
                        - z-index: 1;
                      grid:
                        - grid-template-areas: |
                            "icon  circle"
                            "n     n"
                            "s     s"
                        - grid-template-columns: repeat(2, 1fr)
                        - grid-template-rows: auto repeat(2, min-content)
                        - gap: 1.3%
                        - align-items: start
                        - will-change: transform
                      name:
                        - justify-self: start
                        - line-height: 121%
                        - font-size: var(--button-card-font-size);
                        - font-weight: var(--button-card-font-weight);
                        - letter-spacing: var(--button-card-letter-spacing);
                      state:
                        - justify-self: start
                        - line-height: 115%
                        - font-size: var(--button-card-font-size);
                        - font-weight: var(--button-card-font-weight);
                        - letter-spacing: var(--button-card-letter-spacing);
                      card:
                        - padding: 10.9% 9.9% 8.9% 10.9%;
                        - border-radius: var(--button-card-border-radius)
                        - border-width: 0
                        - -webkit-tap-highlight-color: rgba(0,0,0,0)
                        - transition: none
                        - --mdc-ripple-color: >
                            [[[
                              return variables.state_on
                                  ? 'rgb(0, 0, 0)'
                                  : '#97989c';
                            ]]]
                        - color: >
                            [[[
                              return variables.state_on
                                  ? '#4b5254'
                                  : '#97989c';
                            ]]]
                        - background-color: >
                            [[[
                              return variables.state_on
                                  ? 'rgba(255, 255, 255, 0.85)'
                                  : 'rgba(115, 115, 115, 0.25)';
                            ]]]
          

              - type: grid
                columns: 2
                cards: 
                  - type: "custom:button-card"
                    entity: sensor.cuve_volume
                    name: Cuve Eau
                    show_state: false
                    template:
                      - base_no_action
                      - circle
                    variables:
                      circle_input: >
                        [[[
                          if (states['sensor.cuve_volume'].state != 'unavailable') {
                          let volume = (entity.attributes.volume_percent).toString();
                          if (volume) return volume;
                          }
                        ]]]              
                      circle_input_unit: '%'
                    custom_fields:
                      icon: <ha-icon icon='mdi:cup-water'></ha-icon> 
                      
                  - type: "custom:button-card"
                    entity: sensor.number_volets_maison
                    show_entity_picture: false
                    show_state: false
                    show_name: true
                    show_icon: false
                    aspect_ratio: 1/1
                    name: Volets 
                    custom_fields:
                      icon: <ha-icon icon='mdi:window-shutter-auto'></ha-icon> 
                    tap_action: 
                      !include popup/cover2.yaml
                    styles:
                      container: 
                        - text-align: left !important;
                        - z-index: 1;
                      grid:
                        - grid-template-areas: |
                            "icon  circle"
                            "n     n"
                            "s     s"
                        - grid-template-columns: repeat(2, 1fr)
                        - grid-template-rows: auto repeat(2, min-content)
                        - gap: 1.3%
                        - align-items: start
                        - will-change: transform
                      name:
                        - justify-self: start
                        - line-height: 121%
                        - font-size: var(--button-card-font-size);
                        - font-weight: var(--button-card-font-weight);
