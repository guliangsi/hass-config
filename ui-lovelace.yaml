button_card_templates:
  !include_dir_merge_named button_card_templates

decluttering_templates:
  volet_bubble_card:
    card:
      type: custom:bubble-card
      card_type: cover
      entity: '[[entity_cover]]'
      scrolling_effect: true
      show_name: true
      show_last_changed: false
      show_attribute: true
      attribute: current_position
      card_layout: large
      sub_button:
        - entity: '[[input_select_modevolet]]'
          name: ''
          icon: mdi:auto-mode
          show_name: true
          show_state: true
          show_last_changed: false
          show_attribute: false
          show_arrow: false
        - entity: '[[input_select_homemodevolet]]'
          icon: mdi:weather-night
          name: ''
          show_name: false
          show_attribute: false
          show_last_changed: false
          show_state: true
          show_arrow: false
          show_icon: true
          show_background: true
      tap_action:
        action: more-info
      styles: >
        .bubble-sub-button-1.background-off {
            background-color: ${hass.states['[[input_select_modevolet]]'].state === 'Manuel' ? '#0080FF' : hass.states['[[input_select_modevolet]]'].state === 'Auto J/N' ? 'green' : hass.states['[[input_select_modevolet]]'].state === 'Auto Eté' ? '#3AA6B9' : hass.states['[[input_select_modevolet]]'].state === 'Desactive' ? '#FF4040' : 'cccccc'} !important;
          }
        .bubble-sub-button-2.background-off {
            background-color: ${hass.states['[[input_select_homemodevolet]]'].state === 'Jour' ? '#ffe85d' : hass.states['[[input_select_homemodevolet]]'].state === 'Nuit' ? '#17153B' : 'default'} !important;
          }
        .bubble-sub-button-2 {
            color: ${hass.states['input_select.homemodevolet_cuisine'].state === 'Jour' ? 'black' : hass.states['input_select.homemodevolet_cuisine'].state === 'Nuit' ? 'white' : 'default'} !important;
          }
        .bubble-cover-card-container {
            opacity: 1 !important;
            background-color: ${hass.states['[[input_select_modevolet]]'].state === 'Manuel' ? '#0080FF' : hass.states['[[input_select_modevolet]]'].state === 'Desactive' ? '#FF4040': 'default'} !important;
          }
        .bubble-button {
            opacity: 1 !important;
            background-color: ${hass.states['[[input_select_modevolet]]'].state === 'Manuel' ? '#0080FF' : hass.states['[[input_select_modevolet]]'].state === 'Desactive' ? '#FF4040': 'default'} !important;
          } 
        ${subButtonIcon[0].setAttribute("icon",
        hass.states['[[input_select_modevolet]]'].state === 'Auto Eté' ?
        'mdi:sun-thermometer' :
        hass.states['[[input_select_modevolet]]'].state === 'Auto J/N' ?
        'mdi:sun-clock-outline' :
        hass.states['[[input_select_modevolet]]'].state === 'Desactive' ?
        'mdi:sync-off' : hass.states['[[input_select_modevolet]]'].state ===
        'Manuel' ? 'mdi:gesture-tap' :'mdi:robot-vacuum')}
        
        ${subButtonIcon[1].setAttribute("icon",
        hass.states['[[input_select_homemodevolet]]'].state === 'Jour' ?
        'mdi:weather-partly-cloudy' :
        hass.states['[[input_select_homemodevolet]]'].state === 'Nuit' ?
        'mdi:weather-night' :'mdi:robot-vacuum')}
      name: '[[name_piece]]'
      force_icon: false
      show_state: false
      icon_open: ''
      columns: 1


views:
  - type: custom:grid-layout
    title: Home
    layout:
      #default
      margin: 0
      grid-gap: var(--custom-layout-card-padding)
      grid-template-columns: repeat(4, 1fr) 0
      grid-template-rows: 0 repeat(2, fit-content(100%)) 0fr
      grid-template-areas: |
        "sidebar  .           .       .       ."
        "sidebar  maison  temperatures  porte  ."
        "sidebar  sports       salon  lumiere   ."
        "sidebar  footer      footer  footer  ."
      mediaquery:
        #phone
        "(max-width: 800px)":
          grid-gap: calc(var(--custom-layout-card-padding) * 1.7)
          grid-template-columns: 0 repeat(2, 1fr) 0
          grid-template-rows: 0 repeat(5, fit-content(100%)) 0fr
          grid-template-areas: |
            ".  .           .        ."
            ".  sidebar     sidebar  ."
            ".  salon  porte   ."
            ".  maison      temperatures   ."
            ".  sports       lumiere    ."
            ".  footer      footer   ."
            ".  .    t       .        ."
        #portrait
        "(max-width: 1200px)":
          grid-gap: var(--custom-layout-card-padding)
          grid-template-columns: repeat(3, 1fr) 0
          grid-template-rows: 0 repeat(3, fit-content(100%)) 0fr
          grid-template-areas: |
            "sidebar  .           .       ."
            "sidebar  maison  temperatures  ."
            "sidebar  porte      lumiere  ."
            "sidebar  sports       salon   ."
            "sidebar  footer      footer  ."
            "sidebar  .           .       ."
    cards:

      #extra_styles fix, do not remove
      #also warn if theme is not set

      - type: custom:button-card
        view_layout:
          grid-area: 1 / 2 / 2 / 5
        name: SET THEME TO "tablet" IN PROFILE
        tap_action:
          action: navigate
          navigation_path: /profile
        styles:
          card:
            - display: >
                [[[
                  return hass.themes.theme === 'tablet'
                      ? 'none'
                      : 'initial';
                ]]]
          name:
            - z-index: 1
            - overflow: visible
            - color: red
            - font-weight: bolder
            - font-size: xxx-large
            - background: yellow

      #################################################
      #                                               #
      #                    SIDEBAR                    #
      #                                               #
      #################################################

      - type: vertical-stack
        view_layout:
          grid-area: sidebar
        cards:

          - type: custom:button-card
            entity: sensor.template_sidebar
            template: sidebar
            
          - type: grid
            square: true
            cards:
             - type: conditional
               conditions:
                 - entity: sensor.unavailable_entities
                   condition: "numeric_state"
                   above: 0
               card:
                 type: custom:button-card
                 entity: sensor.unavailable_entities
                 name: Status
                 tap_action:
                   !include popup/footer_status.yaml
                 variables:
                  notify: >
                     [[[
                       return parseInt(entity?.state);
                     ]]]
                 icon: mdi:check-network
                 show_state: false
                 show_icon: true
                 show_name: false
                 color_type: icon
                 state:
                   - value: '0'
                     operator: '>'
                     color: '#ff0000'
          
             - type: conditional
               conditions:
                 - entity: binary_sensor.poubelle_a_sortir
                   state: 'on'
               card:
                 type: custom:button-card
                 show_icon: true
                 show_name: false
                 tap_action:
                   action: none
                 entity: sensor.next_poubelle
                 icon: mdi:delete
                 color_type: icon
                 state:
                   - value: verte
                     operator: '=='
                     color: '#008000'
                   - value: jaune
                     operator: '=='
                     color: '#ffff00'
                 hold_action:
                   action: none
                 name: Poubelle
                 show_state: false

             - type: conditional
               conditions:
                 - entity: input_select.vmc_filter
                   state_not: 'ok'
               card:
                 type: custom:button-card
                 entity: input_select.vmc_filter
                 name: VMC
                 icon: mdi:air-filter
                 show_state: false
                 show_icon: true
                 show_name: false
                 tap_action:
                   !include popup/footer_vmc.yaml  
                 color_type: icon
                 state:
                   - value: 'clean'
                     operator: '=='
                     color: '#ffa500'
                   - value: 'change'
                     operator: '=='
                     color: '#ff0000'
                 hold_action:
                   action: none


             - type: conditional
               conditions:
                 - entity: sensor.79_weather_alert
                   state_not: 'unknown'
               card:
                 type: custom:button-card
                 entity: sensor.79_weather_alert
                 name: Alerte Météo
                 icon: mdi:weather-cloudy-alert
                 show_state: false
                 show_icon: true
                 show_name: false
                 tap_action:
                   action: none
                 color_type: icon
                 state:
                   - value: unknown
                     operator: '!='
                     color: '#fffd54'
                 hold_action:
                   action: none
  
             - type: conditional
               conditions:
                 - entity: sensor.saint_martin_de_saint_maixent_next_rain
                   state_not: 'unknown'
               card:
                 type: custom:button-card
                 show_icon: true
                 show_name: false
                 tap_action:
                   action: none
                 entity: sensor.saint_martin_de_saint_maixent_next_rain
                 icon: mdi:weather-pouring
                 color_type: icon
                 state:
                   - value: unknown
                     operator: '!='
                     color: '#fffd54'
                 hold_action:
                   action: none
                 name: Pluie dans l'heure
                 show_state: false
                  
             - type: conditional
               conditions:
                 - entity: sensor.pollens_79
                   state_not: 'unknown'
               card:
                 type: custom:button-card
                 entity: sensor.pollens_79
                 name: Pollens
                 icon: mdi:flower-pollen
                 color_type: icon
                 show_name: false
                 show_state: false
                 state:
                   - value: très faible
                     operator: '=='
                     color: '#75f94c'
                   - value: faible
                     operator: '=='
                     color: '#377d22'
                   - value: moyen
                     operator: '=='
                     color: '#fffd54'
                   - value: élevé
                     operator: '=='
                     color: '#ef8641'
                   - value: très élevé
                     operator: '=='
                     color: '#ea3522'
                 tap_action:
                   !include popup/sidebar_pollens.yaml                  
            columns: 3 

      #################################################
      #                                               #
      #                  SALON                        #
      #                                               #
      #################################################

      - type: grid
        title: Salon
        view_layout:
          grid-area: salon
        columns: 2
        cards:

          - type: custom:button-card
            entity: media_player.xbox_serie_x_salon
            name: Xbox
            template:
              - media
              - icon_xrotate

          - type: custom:button-card
            entity: media_player.salon
            name: Apple TV
            template:
              - media
              - icon_apple_tv

          - type: custom:button-card
            entity: media_player.samsung_7_series_55
            name: Tv
            state_display: >
              [[[
                if (variables.state === 'playing') {
                    return 'Playing';
                }
                if (variables.state === true) {
                    return variables.translate_unknown;
                }
              ]]]
            template:
              - base
              - icon_tv
              - loader

          - type: custom:button-card
            entity: remote.harmony_hub
            name: Activité
            template:
              - base
              - icon_tv
              - loader

      #################################################
      #                                               #
      #                    Maison                     #
      #                                               #
      #################################################


      - type: grid
        title: Maison
        view_layout:
          grid-area: maison
        columns: 1
        cards:
          - type: custom:swipe-card
            start_card: 1
            parameters:
              roundLengths: true
              effect: coverflow
              speed: 650
              spaceBetween: 20
              threshold: 7
              coverflowEffect:
                rotate: 80
                depth: 300
            cards:
              - type: grid
                columns: 2
                cards:            
                  - type: "custom:button-card"
                    entity: alarm_control_panel.alarmo
                    show_entity_picture: false
                    show_state: false
                    show_name: true
                    show_icon: false
                    aspect_ratio: 1/1
                    name: Alarme          
                    tap_action: 
                      !include popup/alarme.yaml
                    custom_fields:
                      icon: <ha-icon icon='mdi:shield-off-outline'></ha-icon> 
                    state:
                      - value: 'arming'
                        icon: <ha-icon icon='mdi:shield-off-outline'></ha-icon>
                        styles:
                          card:
                            - animation: blink 3s ease infinite
                            - background-color: '#FAA255'
                      - value: 'armed_away'
                        icon: <ha-icon icon='mdi:shield-lock'></ha-icon>
                        styles:
                          card:
                            - background-color: '#BA494B'
                      - value: 'armed_home'
                        icon: <ha-icon icon='mdi:shield-account'></ha-icon>
                        styles:
                          card:
                            - background-color: '#F0C438'
                      - value: 'armed_night'
                        icon: <ha-icon icon='mdi:shield-home'></ha-icon>
                        styles:
                          card:
                            - background-color: '#66C6F2'
                      - value: 'armed_custom_bypass'
                        icon: <ha-icon icon='mdi:security'></ha-icon>
                        styles:
                          card:
                            - background-color: '#7F7CE6'
                      - value: 'pending'
                        icon: <ha-icon icon='mdi:shield-sync'></ha-icon>
                        styles:
                          card:
                            - animation: blink 4s ease infinite
                            - background-color: '#FAA255'
                      - value: 'triggered'
                        icon: <ha-icon icon='mdi:bell-ring'></ha-icon>
                        styles:
                          card:
                            - animation: blink 1s ease infinite
                            - background-color: '#f70d1a'
                      - value: 'unavailable'
                        icon: <ha-icon icon='mdi:shield-alert'></ha-icon>
                        styles:
                          card:
                            - animation: blink 10s ease infinite
                            - background-color: '#657c80'
                      - value: 'unknown'
                        icon: <ha-icon icon='mdi:shield-alert'></ha-icon>
                        styles:
                          card:
                            - animation: blink 10s ease infinite
                            - background-color: '#6f8499'
                    styles:
                      container: 
                        - text-align: left !important;
                        - z-index: 1;
                      grid:
                        - grid-template-areas: |
                            "icon  circle"
                            "n     n"
                            "s     s"
                        - grid-template-columns: repeat(2, 1fr)
                        - grid-template-rows: auto repeat(2, min-content)
                        - gap: 1.3%
                        - align-items: start
                        - will-change: transform
                      name:
                        - justify-self: start
                        - line-height: 121%
                        - font-size: var(--button-card-font-size);
                        - font-weight: var(--button-card-font-weight);
                        - letter-spacing: var(--button-card-letter-spacing);
                      state:
                        - justify-self: start
                        - line-height: 115%
                        - font-size: var(--button-card-font-size);
                        - font-weight: var(--button-card-font-weight);
                        - letter-spacing: var(--button-card-letter-spacing);
                      state::first-letter: 
                        - text-transform: uppercase;
                      card:
                        - padding: 10.9% 9.9% 8.9% 10.9%;
                        - border-radius: var(--button-card-border-radius)
                        - border-width: 0
                        - -webkit-tap-highlight-color: rgba(0,0,0,0)
                        - transition: none
                        - --mdc-ripple-color: >
                            [[[
                              return variables.state_on
                                  ? 'rgb(0, 0, 0)'
                                  : '#97989c';
                            ]]]
                        - color: >
                            [[[
                              return variables.state_on
                                  ? '#4b5254'
                                  : '#97989c';
                            ]]]
                        - background-color: >
                            [[[
                              return variables.state_on
                                  ? 'rgba(255, 255, 255, 0.85)'
                                  : 'rgba(115, 115, 115, 0.25)';
                            ]]]
          
                  - type: "custom:button-card"
                    entity: camera.garage
                    name: Caméras
                    show_state: false
                    template:
                      - base_no_action
                    tap_action: 
                      !include popup/camera.yaml
                    custom_fields:
                      icon: <ha-icon icon='mdi:cctv'></ha-icon> 

                  - type: "custom:button-card"
                    entity: sensor.number_volets_maison
                    show_entity_picture: false
                    show_state: false
                    show_name: true
                    show_icon: false
                    aspect_ratio: 1/1
                    name: Volets 
                    custom_fields:
                      icon: <ha-icon icon='mdi:window-shutter-auto'></ha-icon> 
                    tap_action: 
                      !include popup/volets2.yaml
                    styles:
                      container: 
                        - text-align: left !important;
