                        - border-width: 0
                        - -webkit-tap-highlight-color: rgba(0,0,0,0)
                        - transition: none
                        - --mdc-ripple-color: >
                            [[[
                              return variables.state_on
                                  ? 'rgb(0, 0, 0)'
                                  : '#97989c';
                            ]]]
                        - color: >
                            [[[
                              return variables.state_on
                                  ? '#4b5254'
                                  : '#97989c';
                            ]]]
                        - background-color: >
                            [[[
                              return variables.state_on
                                  ? 'rgba(255, 255, 255, 0.85)'
                                  : 'rgba(115, 115, 115, 0.25)';
                            ]]]

      #################################################
      #                                               #
      #                    PORTE                      #
      #                                               #
      #################################################

      - type: grid
        title: Ouvertures
        view_layout:
          grid-area: porte
        columns: 1
        cards:
          - type: custom:swipe-card
            start_card: 1
            parameters:
              roundLengths: true
              effect: coverflow
              speed: 650
              spaceBetween: 20
              threshold: 7
              coverflowEffect:
                rotate: 80
                depth: 300
            cards:
              - type: grid
                columns: 2
                cards:
                  - type: custom:button-card
                    entity: binary_sensor.detecteur_ouverture_cuisine_contact
                    name: Cuisine
                    template:
                      - base_no_action
                    custom_fields:
                      icon: <ha-icon icon='mdi:door-sliding'></ha-icon>                     
          
                  - type: custom:button-card
                    entity: binary_sensor.detecteur_ouverture_salon_contact
                    name: Salon
                    template:
                      - base_no_action
                    custom_fields:
                      icon: <ha-icon icon='mdi:door-sliding'></ha-icon>  
          
                  - type: custom:button-card
                    entity: binary_sensor.detecteur_ouverture_sejour_droite_contact
                    name: Salle à manger droite
                    template:
