- id: '1746561924653'
  alias: Telegram - Bilan - Notification production de jour
  description: ''
  triggers:
  - at: '20:30:00'
    trigger: time
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.energy_production_daily
        above: 1
        below: 5
      sequence:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_8180449312_7673543932
        data:
          message: "-----------------------------------\n\nAujourd’hui la maison n'a
            produit que *{{ states(\"sensor.energy_production_daily\") }} KWh* d'énergie
            gratuite en raison du mauvais temps...\n\n☀️ Detail :   \n-----------------------------------\n
            *+* Production Solaire : *{{ states(\"sensor.energy_production_daily\")
            }} KWh*\n *+* Consommation Totale : *{{ states(\"sensor.energy_consumption_daily\")
            }} KWh*\n *+* Consommation Solaire : *{{ (states('sensor.energy_production_daily')
            | float(default=0) - states('sensor.energy_export_daily') | float(default=0))
            | round(2)}} KWh*\n *+* Import réseau : *{{ states(\"sensor.energy_import_daily\")
            }} KWh*\n *+* Retour réseau : *{{ states(\"sensor.energy_export_daily\")
            }} KWh*\n *+* Autoconsomation : *{{ ((states('sensor.energy_production_daily')
            | float(default=0) - states('sensor.energy_export_daily') | float(default=0))
            / (states('sensor.energy_consumption_daily') | float(default=0))) | round(2)
            *100  }} %*\n-----------------------------------"
          title: ☀️ *Petite journée de production*
    - conditions:
      - condition: numeric_state
        entity_id: sensor.energy_production_daily
        above: 5
        below: 10
      sequence:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_8180449312_7673543932
        data:
          message: "-----------------------------------\n\nAujourd’hui en raison de
            la météo changeante, la maison n'a produit que *{{ states(\"sensor.energy_production_daily\")
            }} KWh* d'énergie gratuite !\n\n\n☀️ Detail :   \n-----------------------------------\n
            *+* Production Solaire : *{{ states(\"sensor.energy_production_daily\")
            }} KWh*\n *+* Consommation Totale : *{{ states(\"sensor.energy_consumption_daily\")
            }} KWh*\n *+* Consommation Solaire : *{{ (states('sensor.energy_production_daily')
            | float(default=0) - states('sensor.energy_export_daily') | float(default=0))
            | round(2)}} KWh*\n *+* Import réseau : *{{ states(\"sensor.energy_import_daily\")
            }} KWh*\n *+* Retour réseau : *{{ states(\"sensor.energy_export_daily\")
            }} KWh*\n *+* Autoconsomation : *{{ ((states('sensor.energy_production_daily')
            | float(default=0) - states('sensor.energy_export_daily') | float(default=0))
            / (states('sensor.energy_consumption_daily') | float(default=0))) | round(2)
            *100  }} %*\n-----------------------------------"
          title: ☀️ *Poduction solaire moyenne*
    - conditions:
      - condition: numeric_state
        entity_id: sensor.energy_production_daily
        above: 10
      sequence:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_8180449312_7673543932
        data:
          message: "-----------------------------------\n\nAujourd’hui la maison a
            produit *{{ states(\"sensor.energy_production_daily\") }} KWh* d'énergie
            gratuite !\n\n☀️ Detail : \n-----------------------------------\n *+*
            Production Solaire : *{{ states(\"sensor.energy_production_daily\") }}
            KWh*\n *+* Consommation Totale : *{{ states(\"sensor.energy_consumption_daily\")
            }} KWh*\n *+* Consommation Solaire : *{{ (states('sensor.energy_production_daily')
            | float(default=0) - states('sensor.energy_export_daily') | float(default=0))
            | round(2)}} KWh*\n *+* Import réseau : *{{ states(\"sensor.energy_import_daily\")
            }} KWh*\n *+* Retour réseau : *{{ states(\"sensor.energy_export_daily\")
            }} KWh*\n *+* Autoconsomation : *{{ ((states('sensor.energy_production_daily')
            | float(default=0) - states('sensor.energy_export_daily') | float(default=0))
            / (states('sensor.energy_consumption_daily') | float(default=0))) | round(2)
            *100  }} %*\n-----------------------------------"
          title: ☀️ *Excellente production solaire*
  mode: single
