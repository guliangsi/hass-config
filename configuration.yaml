homeassistant:
  unit_system: metric
  country: FR
  time_zone: "Europe/Paris"
  allowlist_external_dirs:
    - !secret allowlist_external_dirs
  external_url: !secret external_url
  internal_url: !secret internal_url

zone:
  # This will override the default home zone
  - name: Home
    latitude: !secret home_lat
    longitude: !secret home_lon
    radius: !secret home_radius
    icon: mdi:home

http:
  ssl_certificate: !secret ssl_certificate
  ssl_key: !secret ssl_key
  use_x_forwarded_for: true
  trusted_proxies:
    - !secret nginx_proxy_ip
    - !secret cloudflare_tunnel_ip

# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  extra_module_url:
    - /hacsfiles/lovelace-card-mod/card-mod.js
  themes: !include_dir_merge_named themes

influxdb:
  api_version: 2
  host: !secret influxdb_host
  port: !secret influxdb_port
  ssl: false
  token: !secret influxdb_token
  organization: !secret influxdb_organization
  bucket: !secret influxdb_bucket
  include:
    entities:
      - sensor.freebox_download_speed
      - sensor.freebox_upload_speed
      - sensor.detecteur_carport_air_temperature
      - sensor.detecteur_fumee_cellier_air_temperature
      - sensor.detecteur_fumee_entree_air_temperature
      - sensor.detecteur_vibration_cave_device_temperature

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
mqtt: !include mqtt.yaml

sensor: !include sensor.yaml
template: !include template.yaml
input_number: !include input_number.yaml
input_boolean: !include input_boolean.yaml
input_select: !include input_select.yaml

