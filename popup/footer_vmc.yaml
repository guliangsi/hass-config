action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: VMC Filtres
    style: >
      --popup-max-width: calc(500px);
      --ha-card-border-radius: 0;
    card_mod:
      style:
        layout-card:
          $grid-layout$:
            # card divider border
            .: |
              #root {
                  margin: -24px 0 !important;
              }
            hui-entities-card:
              $: |
                .card-content {
                  padding: var(--tablet-popup-content-padding);
                  padding-bottom: 0.8em;
                }
                ha-card {
                  border-right: 1.5px solid rgba(0, 0, 0, 0.2);
                  border-radius: 0;
                  transition: none;
                }
                /* portrait */
                @media screen and (max-width: 1200px) {
                  ha-card {
                    border-right: none;
                    border-bottom: 1.5px solid rgba(0, 0, 0, 0.2);
                  }
                }
              $hui-horizontal-stack-card:
                # horizontal bottom buttons
                $: |
                  #root {
                    justify-content: space-evenly;
                    margin-top: 1.7em;
                    max-width: 82vw; /* iphonex */
                  }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        margin: 0
        grid-template-columns: 500px 
        grid-template-rows: 1fr
        grid-template-areas: |
          "vmc"
        mediaquery:
          #portrait
          "(max-width: 1200px)":
            grid-template-columns: 1fr
            grid-template-rows: repeat(3, 1fr)
            grid-template-areas: |
              "vmc"
      cards:
        - type: vertical-stack
          view_layout:
            grid-area: vmc  
          cards:            
            - type: entities
              entities:
                - entity: sensor.vmc_date_changement_filtre
                  name: Dernier changement filtre
                  icon: mdi:new-box
                - entity: sensor.vmc_date_nettoyage_filtre
                  name: Dernier nettoyage filtre
                  icon: mdi:autorenew            
            - type: custom:hui-horizontal-stack-card
              cards:
                - type: custom:button-card
                  name: Nettoyage
                  icon: mdi:autorenew
                  confirmation:
                    text: Avez-vous nettoyer le filtre la VMC?
                  tap_action:
                    action: call-service
                    service: automation.trigger
                    data: {}
                    target:
                      entity_id: automation.vmc_clean_filter
                  template: icon_name
                  
                - type: custom:button-card
                  name: Changement
                  icon: mdi:new-box
                  confirmation:
                    text: Avez-vous changer le filtre de la VMC?
                  tap_action:
                    action: call-service
                    service: automation.trigger
                    data: {}
                    target:
                      entity_id: automation.vmc_filter_change
                  template: icon_name

