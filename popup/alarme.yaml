action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Alarme
    style: >
      --popup-max-width: calc(400px + 400px);
      --ha-card-border-radius: 0;
    card_mod:
      style:
        layout-card:
          $grid-layout$:
            # card divider border
            .: |
              #root {
                  margin: -24px 0 !important;
              }
            hui-entities-card:
              $: |
                .card-content {
                  padding: var(--tablet-popup-content-padding);
                  padding-bottom: 0.8em;
                }
                ha-card {
                  border-right: 1.5px solid rgba(0, 0, 0, 0.2);
                  border-radius: 0;
                  transition: none;
                }
                /* portrait */
                @media screen and (max-width: 1200px) {
                  ha-card {
                    border-right: none;
                    border-bottom: 1.5px solid rgba(0, 0, 0, 0.2);
                  }
                }
              $hui-horizontal-stack-card:
                # horizontal bottom buttons
                $: |
                  #root {
                    justify-content: space-evenly;
                    margin-top: 1.7em;
                    max-width: 82vw; /* iphonex */
                  }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        margin: 0
        grid-template-columns: 400px 400px
        grid-template-rows: 2fr
        grid-template-areas: |
          "alarme state"
        mediaquery:
          #portrait
          "(max-width: 1200px)":
            grid-template-columns: 1fr
            grid-template-rows: repeat(3, 1fr)
            grid-template-areas: |
              "alarme"
              "state"
      cards:
        - type: custom:mushroom-alarm-control-panel-card
          view_layout:
            grid-area: alarme          
          entity: alarm_control_panel.alarmo
          states:
            - armed_away
          show_keypad: true
          fill_container: true
          layout: vertical
          name: Alarme
                  
        -  type: vertical-stack
           view_layout:
             grid-area: state           
           cards:
             - type: custom:mushroom-entity-card
               entity: binary_sensor.detecteur_ouverture_salon_contact
               name: Baie vitrée Salon
             - type: custom:mushroom-entity-card
               entity: binary_sensor.detecteur_ouverture_cuisine_contact
               name: Baie vitrée Cuisine
             - type: custom:mushroom-entity-card
               entity: binary_sensor.detecteur_ouverture_sejour_gauche_contact
               name: Baie vitrée Salle à manger (gauche)
             - type: custom:mushroom-entity-card
               entity: binary_sensor.detecteur_ouverture_sejour_droite_contact
               name: Baie vitrée Salle à manger (droite)
             - type: custom:mushroom-entity-card
               entity: binary_sensor.detecteur_ouverture_porte_salon_contact
               name: Porte Salle à manger
             - type: custom:mushroom-entity-card
               entity: binary_sensor.detecteur_ouverture_chambre_parentale_contact
               name: Porte Chambre parentale
             - type: custom:mushroom-entity-card
               entity: binary_sensor.detecteur_ouverture_porte_entree_contact
               name: Porte Entrée
             - type: custom:mushroom-entity-card
               entity: binary_sensor.detecteur_ouverture_porte_service_garage_contact
               name: Porte Service garage
             - type: custom:mushroom-entity-card
               entity: binary_sensor.portail_garage_state
               name: Portail garage               
             - type: custom:mushroom-entity-card
               entity: binary_sensor.presence_sensor_fp2_2080_presence_sensor_1
               icon: mdi:motion-sensor
               name: Presence Entrée
             - type: custom:mushroom-entity-card
               entity: binary_sensor.presence_sensor_fp2_2276_presence_sensor_1
               icon: mdi:motion-sensor
               name: Presence Salon
card_bounce: |
  [[[
    // add animation
    if (this.getElementsByTagName("style").length === 0) {
          // phone condition
          let mq = window.matchMedia('(max-width: 800px)').matches;
          let style = document.createElement('style');
          style.innerHTML = `
              @keyframes card_bounce {
                  0%   { transform: scale(1); }
                  10%  { transform: scale(${ mq ? '0.92' : '0.94' }); }
                  25%  { transform: scale(1); }
                  30%  { transform: scale(${ mq ? '0.96' : '0.98' }); }
                  100% { transform: scale(1); }
              }
          `;
          this.appendChild(style);
      }
      // duration
      let duration = 800;
      // animate
      this.style.animation = `card_bounce ${duration}ms cubic-bezier(0.22, 1, 0.36, 1)`;
      // reset
      window.setTimeout(() => { this.style.animation = "none"; }, duration + 100)
    ]]]