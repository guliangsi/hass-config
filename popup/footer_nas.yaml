action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Serveurs
    style: >
      --popup-max-width: calc(385px + 385px + 385px);
      --ha-card-border-radius: 0;
    card_mod:
      style:
        layout-card:
          $grid-layout$:
            # card divider border
            .: |
              #root {
                  margin: -24px 0 !important;
              }
            hui-entities-card:
              $: |
                .card-content {
                  padding: var(--tablet-popup-content-padding);
                  padding-bottom: 0.8em;
                }
                ha-card {
                  border-right: 1.5px solid rgba(0, 0, 0, 0.2);
                  border-radius: 0;
                  transition: none;
                }
                /* portrait */
                @media screen and (max-width: 1200px) {
                  ha-card {
                    border-right: none;
                    border-bottom: 1.5px solid rgba(0, 0, 0, 0.2);
                  }
                }
              $hui-horizontal-stack-card:
                # horizontal bottom buttons
                $: |
                  #root {
                    justify-content: space-evenly;
                    margin-top: 1.7em;
                    max-width: 82vw; /* iphonex */
                  }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        margin: 0
        grid-template-columns: 385px 385px 385px
        grid-template-rows: 1fr
        grid-template-areas: |
          "hass tasmota nas"
        mediaquery:
          #portrait
          "(max-width: 1200px)":
            grid-template-columns: 1fr
            grid-template-rows: repeat(3, 1fr)
            grid-template-areas: |
              "hass"
              "tasmota"
              "nas"
      cards:

        ### HOME ASSISTANT

        - type: entities
          view_layout:
            grid-area: hass
          title: Home Assistant
          show_header_toggle: false
          card_mod:
            class: header
          entities:
            - entity: sensor.current_version
              name: Installé
              icon: mdi:home-assistant

            - entity: binary_sensor.home_assistant_website_update_available

            - entity: sensor.home_assistant_v2_db_size
              name: Database size
              icon: mdi:database

            - entity: sensor.home_assistant_log_size
              name: Log size
              icon: mdi:file-document

            - entity: sensor.uptime
              name: Dernier démarrage
              icon: mdi:update

            - type: custom:bar-card
              width: 55%
              height: 2em
              decimal: 0
              unit_of_measurement: '%'
              positions: &bar_card_positions
                icon: outside
                indicator: 'off'
                name: outside
              severity: &bar_card_severity
                - color: '#6d2525'
                  from: 85
                  to: 999
              entity_row: true
              entities:

                - entity: sensor.home_assistant_core_cpu_percent
                  name: Processeur
                  icon: mdi:chip

                - entity: sensor.home_assistant_core_memory_percent
                  name: Mémoire
                  icon: mdi:memory

            - type: custom:hui-horizontal-stack-card
              cards:
                - type: custom:button-card
                  name: Restart
                  icon: mdi:reload
                  tap_action:
                    action: call-service
                    service: browser_mod.sequence
                    service_data:
                      sequence:
                        - service: browser_mod.notification
                          data:
                            message: Restart server...
                        - service: browser_mod.delay
                          data:
                            time: 3000
                        - service: homeassistant.restart
                  template: icon_name


        ### TASMOTA (TELEINFO)

        - type: entities
          view_layout:
            grid-area: tasmota
          title: Tasmota (Teleinfo)
          state_color: true
          show_header_toggle: false
          card_mod:
            class: header
          entities:

            - entity: sensor.tasmota_firmware_version
              name: Firmware version
              
            - entity: sensor.tasmota_last_restart_time
              name: Dernier démarrage
              icon: mdi:update
              

        ### NAS

        - type: entities
          view_layout:
            grid-area: nas
          title: Synology DS918+
          show_header_toggle: false
          card_mod:
            class: header
            # no border on last card
            style: |
              ha-card {
                border: none !important;
              }
          entities:
            - entity: binary_sensor.srvnas

            - entity: binary_sensor.srvnas_etat_de_securite
              name: Securité status

            - entity: sensor.srvnas_volume_1_temperature_moyenne_du_disque

            - entity: sensor.srvnas_dernier_demarrage
              name: Dernier démarrage

            - entity: update.srvnas_mise_a_jour_dsm
              icon: mdi:package-up
              name: Update

            - type: custom:bar-card
              width: 55%
              height: 2em
              decimal: 0
              unit_of_measurement: '%'
              positions: *bar_card_positions
              severity: *bar_card_severity
              entity_row: true
              entities:

                - entity: sensor.srvnas_utilisation_du_processeur_totale
                  name: Processor
                  icon: mdi:chip
                  tap_action:
                    action: call-service
                    service: homeassistant.update_entity
                    service_data:
                      entity_id: sensor.srvnas_utilisation_du_processeur_totale

                - entity: sensor.srvnas_utilisation_de_la_memoire_reelle
                  name: Mémoire - 8GB
                  tap_action:
                    action: call-service
                    service: homeassistant.update_entity
                    service_data:
                      entity_id: sensor.srvnas_utilisation_de_la_memoire_reelle

                - entity: sensor.srvnas_volume_1_volume_utilise
                  name: Stockage - 10.5TB
                  tap_action:
                    action: call-service
                    service: homeassistant.update_entity
                    service_data:
                      entity_id: sensor.srvnas_volume_1_volume_utilise

            - type: custom:hui-horizontal-stack-card
              cards:
                - type: custom:button-card
                  name: Reboot
                  icon: mdi:restart-alert
                  confirmation:
                    text: Voulez-vous redémarrer le NAS?
                  tap_action:
                    action: call-service
                    service: browser_mod.sequence
                    service_data:
                      sequence:
                        - service: browser_mod.notification
                          data:
                            message: Startar om NAS...
                        - service: button.press
                          data:
                            entity_id: button.srvnas_reboot
                  template: icon_name

                - type: custom:button-card
                  name: Shutdown
                  icon: mdi:alert
                  confirmation:
                    text: Är du säker på att du vill stänga av NAS?
                  tap_action:
                    action: call-service
                    service: browser_mod.sequence
                    service_data:
                      sequence:
                        - service: browser_mod.notification
                          data:
                            message: Eteindre le NAS...
                        - service: button.press
                          data:
                            entity_id: button.srvnas_shutdown
                  template: icon_name
