                - entity: sun.sun
                  name: Coucher
                  attribute: next_setting  
                  format: time
                - entity: sensor.sunelevation
                  name: Elevation
                - entity: sensor.sunazimuth
                  name: Azimuth    
            - entity: binary_sensor.soleil_volets_est
              type: custom:multiple-entity-row
              name: Volets
