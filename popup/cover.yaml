                      name: Parents
                      toggle: true
                      tap_action: none    
                    - entity: input_boolean.mode_vacances_enfants
                      type: custom:multiple-entity-row
                      name: Enfants
                      toggle: true
                      tap_action: none   

        - type: entities
          view_layout:
            grid-area: sun        
          entities:
            - entity: sensor.detecteur_carport_air_temperature
              type: custom:multiple-entity-row
