action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Volets
    size: fullscreen
    timeout: 20000    
    card_mod:
      style:
        layout-card:
          $grid-layout$:
            # card divider border
            .: |
              #root {
                  margin: -24px 0 !important;
              }
            hui-entities-card:
              $: |
                .card-content {
                  padding: var(--tablet-popup-content-padding);
                  padding-bottom: 0.8em;
                }
                ha-card {
                  border-right: 1.5px solid rgba(0, 0, 0, 0.2);
                  border-radius: 0;
                  transition: none;
                }
                /* portrait */
                @media screen and (max-width: 1200px) {
                  ha-card {
                    border-right: none;
                    border-bottom: 1.5px solid rgba(0, 0, 0, 0.2);
                  }
                }
              $hui-horizontal-stack-card:
                # horizontal bottom buttons
                $: |
                  #root {
                    justify-content: space-evenly;
                    margin-top: 1.7em;
                    max-width: 82vw; /* iphonex */
                  }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        margin: 0
        grid-template-columns: 32% 2% 32% 2% 32% 
        grid-template-rows: 15px auto
        grid-template-areas: |
          "header  header header  header  header"
          "modes   .      sun     .       pv"
          "enfants .      infos   .       pv"
          "enfants .      parents .       pv"
      cards:
        - type: vertical-stack
          view_layout:
            grid-area: modes  
          cards:
            - type: horizontal-stack
              cards:
                - type: custom:button-card
                  icon: mdi:sun-clock-outline
                  tap_action:
                    action: call-service
                    service: input_select.select_option
                    service_data:
                      entity_id: input_select.modevolets
                      option: Auto J/N
                  hold_action:
                    action: more-info
                  show_icon: true
                  show_name: true
                  entity: input_select.modevolets
                  name: Auto J/N
                  styles:
                    card:
                      - background-color: rgb(59,64,72)
                  state:
                    - value: Auto J/N
                      styles:
                        card:
                          - background-color: white
                          - color: rgb(59,64,72)
                        icon:
                          - color: rgb(59,64,72)
                - type: custom:button-card
                  icon: mdi:sun-thermometer
                  tap_action:
                    action: call-service
                    service: input_select.select_option
                    service_data:
                      entity_id: input_select.modevolets
                      option: Auto Eté
                  hold_action:
                    action: more-info
                  show_icon: true
                  show_name: true
                  entity: input_select.modevolets
                  name: Auto Eté
                  styles:
