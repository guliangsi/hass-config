action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Réseaux
    style: >
      --popup-max-width: calc(385px + 385px + 385px);
      --ha-card-border-radius: 0;
    card_mod:
      style:
        layout-card:
          $grid-layout$:
            # card divider border
            .: |
              #root {
                  margin: -24px 0 !important;
              }
            hui-entities-card:
              $: |
                .card-content {
                  padding: var(--tablet-popup-content-padding);
                  padding-bottom: 0.8em;
                }
                ha-card {
                  border-right: 1.5px solid rgba(0, 0, 0, 0.2);
                  border-radius: 0;
                  transition: none;
                }
                /* portrait */
                @media screen and (max-width: 1200px) {
                  ha-card {
                    border-right: none;
                    border-bottom: 1.5px solid rgba(0, 0, 0, 0.2);
                  }
                }
              $hui-horizontal-stack-card:
                # horizontal bottom buttons
                $: |
                  #root {
                    justify-content: space-evenly;
                    margin-top: 1.7em;
                    max-width: 82vw; /* iphonex */
                  }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        margin: 0
        grid-template-columns: 385px 385px 385px
        grid-template-rows: 1fr
        grid-template-areas: |
          "bande_passante adguard network"
        mediaquery:
          #portrait
          "(max-width: 1200px)":
            grid-template-columns: 1fr
            grid-template-rows: repeat(3, 1fr)
            grid-template-areas: |
              "bande_passante"
              "adguard"
              "network"
      cards:
        - type: vertical-stack
          view_layout:
            grid-area: bande_passante  
          cards:      
            - type: custom:mini-graph-card
              name: Freebox bande pssante
              hours_to_show: 0.5
              points_per_hour: 900
              line_width: 3
              lower_bound: 0
              icon: mdi:speedometer
              entities:
                - entity: sensor.freebox_download_speed
                  show_state: true
                - entity: sensor.freebox_upload_speed
                  show_state: true
                                
        -  type: entities
           title: AdGuard Home
           view_layout:
             grid-area: adguard          
           entities:
             - entity: switch.adguard_home_controle_parental
               name: Contrôle parental
             - entity: switch.adguard_home_filtrage
               name: Filtrage
             - entity: switch.adguard_home_journal_des_requetes
               name: Journal des requêtes
             - entity: switch.adguard_home_navigation_securisee
               name: Navigation sécurisée
             - entity: switch.adguard_home_protection
               name: Protection
             - entity: switch.adguard_home_recherche_securisee
               name: Recherche sécurisée           
             - entity: sensor.adguard_home_controle_parental_bloque
               name: Contrôle parental bloqué
             - entity: sensor.adguard_home_navigation_securisee_bloquee
               name: Navigation sécurisée bloquée
             - entity: sensor.adguard_home_nombre_de_regles
               name: Nombre de règles
             - entity: sensor.adguard_home_recherches_securisees_appliquees
               name: Recherches sécurisées appliquées
             - entity: sensor.adguard_home_requetes_dns
               name: Requêtes DNS
             - entity: sensor.adguard_home_requetes_dns_bloquees
               name: Requêtes DNS bloquées
             - entity: sensor.adguard_home_taux_de_requetes_dns_bloquees
               name: Taux de requêtes DNS bloquées
             - entity: sensor.adguard_home_vitesse_de_traitement_moyenne
               name: Vitesse de traitement moyenne
