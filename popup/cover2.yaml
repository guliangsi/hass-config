action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Volets
    size: fullscreen
    card_mod:
      style:
        layout-card:
          $grid-layout$:
            # card divider border
            .: |
              #root {
                  margin: -24px 0;
              }

    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        margin: 0
        grid-template-columns: 32% 2% 32% 2% 32%
        grid-template-rows: 12px 100px 100px 12px 12px 120px
        grid-template-areas: |
          "header         header    header      header      header"
          "voletsmaison   .         sun         .           temp"
          "vacances              .         volets           .           nuages"
          ".              .         .           .           ."
          ".              .         .           .           ."
          "voletsenfants  .         voletsparents           .           piecedevie"
      cards:
        - type: entities
          view_layout:
            grid-area: vacances
          entities:   
            - entity: input_select.modevacances
              type: custom:multiple-entity-row
              name: Vacances
              icon: mdi:airplane
              show_state: false
              show_icon: true
              entities:
                - entity: input_boolean.mode_vacances_parents
                  type: custom:multiple-entity-row
                  name: Parents
                  toggle: true
                  tap_action: none    
                - entity: input_boolean.mode_vacances_enfants
                  type: custom:multiple-entity-row
                  name: Enfants
                  toggle: true
                  tap_action: none   

        - type: vertical-stack
          view_layout:
            grid-area: sun
          cards:
            - type: custom:bubble-card
              card_type: button
              button_type: name
              name: Températures
              icon: mdi:thermometer
              sub_button:
                - entity: sensor.detecteur_carport_air_temperature
                  show_state: true
                  show_name: true
                  show_background: false
                  name: Carport
                - entity: sensor.temp_max_to_day
                  name: Max
                  show_name: true
                  show_state: true
                  show_background: false
                - entity: input_number.vr_sun_hot
                  name: Seuil
                  show_name: true
                  show_state: true
                  show_background: false
                - entity: binary_sensor.vr_sun_hot_forecast
                  name: Canicule
                  show_name: true
                  show_state: true
                  show_background: false
              card_layout: large-2-rows
            - type: custom:bubble-card
              card_type: empty-column


        - type: vertical-stack
          view_layout:
            grid-area: temp        
          cards:
            - type: custom:bubble-card
              card_type: button
              button_type: name
              name: Températures
              icon: mdi:thermometer
              sub_button:
                - entity: sensor.detecteur_carport_air_temperature
                  show_state: true
                  show_name: true
                  show_background: false
                  name: Carport
                - entity: sensor.temp_max_to_day
                  name: Max
                  show_name: true
                  show_state: true
                  show_background: false
                - entity: input_number.vr_sun_hot
                  name: Seuil
                  show_name: true
                  show_state: true
                  show_background: false
                - entity: binary_sensor.vr_sun_hot_forecast
                  name: Canicule
                  show_name: true
                  show_state: true
                  show_background: false
              card_layout: large-2-rows
            - type: custom:bubble-card
              card_type: empty-column

        - type: vertical-stack
          view_layout:
            grid-area: nuages        
          cards:
            - type: custom:bubble-card
              card_type: button
              button_type: name
              name: Nuages
              icon: mdi:cloud
              sub_button:
                - entity: sensor.saint_martin_de_saint_maixent_cloud_cover
                  name: Couverture
                  show_name: true
                  show_state: true
                  show_background: false
                - entity: input_number.vr_cloud_cover
                  name: Seuil
                  show_name: true
                  show_state: true
                  show_background: false
                - entity: input_number.vr_sun_hot
                  name: Seuil
                  show_name: true
                  show_state: true
                  show_background: false
            - type: custom:bubble-card
              card_type: empty-column

        - type: vertical-stack
          view_layout:
            grid-area: volets        
          cards:
            - type: custom:bubble-card
              card_type: button
              button_type: name
              sub_button:
                - entity: binary_sensor.soleil_volets_est
                  name: Est
                  show_name: true
                - entity: binary_sensor.soleil_volets_sud
                  name: Sud
                  show_name: true
                - entity: binary_sensor.soleil_volets_chambres_sud
                  name: Sud Ch.
                  show_name: true
                - entity: binary_sensor.soleil_volets_ouest
                  name: Ouest
                  show_name: true
                - entity: binary_sensor.soleil_volets_nord
                  name: Nord
                  show_name: true
              name: Volets
              icon: mdi:sun-thermometer-outline

                  

        - type: custom:bubble-card
          view_layout:
            grid-area: voletsmaison
          card_type: cover
          entity: cover.volets_maison
          scrolling_effect: true
          show_name: true
          show_last_changed: false
          show_attribute: true
          attribute: current_position
          card_layout: large
          sub_button:
            - entity: input_select.modevolets
              name: ''
              icon: mdi:auto-mode
              show_name: true
              show_state: true
              show_last_changed: false
              show_attribute: false
              show_arrow: false
            - entity: input_select.homemodevolets
              icon: mdi:weather-night
              name: ''
              show_name: false
              show_attribute: false
              show_last_changed: false
              show_state: true
              show_arrow: false
              show_icon: true
              show_background: true
          tap_action:
            action: more-info
          styles: >
            .bubble-sub-button-1.background-off {
                background-color: ${hass.states['input_select.modevolets'].state === 'Manuel' ? '#0080FF' : hass.states['input_select.modevolets'].state === 'Auto J/N' ? 'green' : hass.states['input_select.modevolets'].state === 'Auto Eté' ? '#3AA6B9' : hass.states['input_select.modevolets'].state === 'Desactive' ? '#FF4040' : 'cccccc'} !important;
              }
            .bubble-sub-button-2.background-off {
                background-color: ${hass.states['input_select.homemodevolets'].state === 'Jour' ? '#ffe85d' : hass.states['input_select.homemodevolets'].state === 'Nuit' ? '#17153B' : 'default'} !important;
              }  
            .bubble-cover-card-container {
              opacity: 1 !important;
              background-color: ${hass.states['input_select.modevolets'].state === 'Manuel' ? '#0080FF' : hass.states['input_select.modevolets'].state === 'Desactive' ? '#FF4040': 'default'} !important;
            } .bubble-button {
              opacity: 1 !important;
              background-color: ${hass.states['input_select.modevolets'].state === 'Manuel' ? '#0080FF' : hass.states['input_select.modevolets'].state === 'Desactive' ? '#FF4040': 'default'} !important;
            } ${subButtonIcon[0].setAttribute("icon",
            hass.states['input_select.modevolets'].state === 'Auto Eté' ?
            'mdi:sun-thermometer' : hass.states['input_select.modevolets'].state === 'Auto
            J/N' ? 'mdi:sun-clock-outline' : hass.states['input_select.modevolets'].state
            === 'Desactive' ? 'mdi:sync-off' :
            hass.states['input_select.modevolets'].state === 'Manuel' ? 'mdi:gesture-tap'
            :'mdi:robot-vacuum')} ${subButtonIcon[1].setAttribute("icon",
            hass.states['input_select.homemodevolets'].state === 'Jour' ?
            'mdi:weather-partly-cloudy' : hass.states['input_select.homemodevolets'].state
            === 'Nuit' ? 'mdi:weather-night' :'mdi:robot-vacuum')}
          name: Maison
          force_icon: false
          show_state: false
          icon_open: ''
          columns: 1

                    
        - type: vertical-stack
          view_layout:
            grid-area: piecedevie        
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Pièce de Vie
              icon: mdi:sofa
              sub_button:
                - entity: binary_sensor.presence_sensor_fp2_2276_presence_sensor_1
                  show_state: true
                  icon: mdi:eye
                  show_icon: true
                - entity: input_boolean.mode_jour_pv
                  show_background: true
                  show_icon: true
                  show_name: true
                  show_state: false
                  show_last_changed: false
                  show_attribute: false
                  tap_action:
                    action: toggle
              styles: >
                  ${subButtonIcon[1].setAttribute("icon",
                  hass.states['input_boolean.mode_jour_pv'].state === 'off' ?
                  'mdi:weather-partly-cloudy' : hass.states['input_boolean.mode_jour_pv'].state
                  === 'on' ? 'mdi:weather-night' :'mdi:robot-vacuum')}

                  ${card.querySelector('ha-card > div > div > div.bubble-sub-button-container >
                  div.bubble-sub-button.bubble-sub-button-2 >
                  div.bubble-sub-button-name-container').innerText = 
                  hass.states['input_boolean.mode_jour_pv'].state === 'off' ? 'Mode Nuit' :
                  hass.states['input_boolean.mode_jour_pv'].state === 'on' ? 'Mode Jour' :
                  'Mode'}
                  
                  .bubble-sub-button-2.background-off {
                    background-color: ${hass.states['input_boolean.mode_jour_pv'].state === 'on' ? '#ffe85d' : hass.states['input_boolean.mode_jour_pv'].state === 'off' ? '#17153B' : 'default'} !important;
                    }
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_cuisine
                - name_piece: Cuisine
                - input_select_modevolet: input_select.modevolet_cuisine
                - input_select_homemodevolet: input_select.homemodevolet_cuisine
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_salle_a_manger
                - name_piece: S. à Manger
                - input_select_modevolet: input_select.modevolet_salle_a_manger
                - input_select_homemodevolet: input_select.homemodevolet_salle_a_manger
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_porte_salon
                - name_piece: Porte SM
                - input_select_modevolet: input_select.modevolet_porte_salon
                - input_select_homemodevolet: input_select.homemodevolet_porte_salon
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_salon
                - name_piece: Salon
                - input_select_modevolet: input_select.modevolet_salon
                - input_select_homemodevolet: input_select.homemodevolet_salon
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_cellier
                - name_piece: Cellier
                - input_select_modevolet: input_select.modevolet_cellier
                - input_select_homemodevolet: input_select.homemodevolet_cellier
            - type: custom:bubble-card
              card_type: empty-column

        ###############################Coin Enfants#########
        - type: vertical-stack
          view_layout:
            grid-area: voletsenfants
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Coin Enfants
              icon: mdi:sofa
              sub_button:
                - entity: input_boolean.mode_jour_coin_enfants
                  show_background: true
                  show_icon: true
                  show_name: true
                  show_state: false
                  show_last_changed: false
                  show_attribute: false
                  tap_action:
                    action: toggle
              styles: >
                  ${subButtonIcon[0].setAttribute("icon",
                  hass.states['input_boolean.mode_jour_coin_enfants'].state === 'off' ?
                  'mdi:weather-partly-cloudy' : hass.states['input_boolean.mode_jour_coin_enfants'].state
                  === 'on' ? 'mdi:weather-night' :'mdi:robot-vacuum')}

                  ${card.querySelector('ha-card > div > div > div.bubble-sub-button-container >
                  div.bubble-sub-button.bubble-sub-button-1 >
                  div.bubble-sub-button-name-container').innerText = 
                  hass.states['input_boolean.mode_jour_coin_enfants'].state === 'off' ? 'Mode Nuit' :
                  hass.states['input_boolean.mode_jour_coin_enfants'].state === 'on' ? 'Mode Jour' :
                  'Mode'}
                  
                  .bubble-sub-button-1.background-off {
                    background-color: ${hass.states['input_boolean.mode_jour_coin_enfants'].state === 'on' ? '#ffe85d' : hass.states['input_boolean.mode_jour_coin_enfants'].state === 'off' ? '#17153B' : 'default'} !important;
                    }
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_chambre_mathis
                - name_piece: Ch. Mathis
                - input_select_modevolet: input_select.modevolet_chambre_mathis
                - input_select_homemodevolet: input_select.homemodevolet_chambre_mathis
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_chambre_arthur
                - name_piece: Ch. Arthur
                - input_select_modevolet: input_select.modevolet_chambre_arthur
                - input_select_homemodevolet: input_select.homemodevolet_chambre_arthur
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_chambre_thibault
                - name_piece: Ch. Thibault
                - input_select_modevolet: input_select.modevolet_chambre_thibault
                - input_select_homemodevolet: input_select.homemodevolet_chambre_thibault
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_salle_de_bain
                - name_piece: S. de Bain
                - input_select_modevolet: input_select.modevolet_salle_de_bain
                - input_select_homemodevolet: input_select.homemodevolet_salle_de_bain
        ###############################Coin Enfants#########
        - type: vertical-stack
          view_layout:
            grid-area: voletsparents
          cards:
            - type: custom:bubble-card
              card_type: separator
              name: Suite Parentale
              icon: mdi:sofa
              sub_button:
                - entity: input_boolean.mode_jour_suite_parentale
                  show_background: true
                  show_icon: true
                  show_name: true
                  show_state: false
                  show_last_changed: false
                  show_attribute: false
                  tap_action:
                    action: toggle
              styles: >
                  ${subButtonIcon[0].setAttribute("icon",
                  hass.states['input_boolean.mode_jour_suite_parentale'].state === 'off' ?
                  'mdi:weather-partly-cloudy' : hass.states['input_boolean.mode_jour_suite_parentale'].state
                  === 'on' ? 'mdi:weather-night' :'mdi:robot-vacuum')}

                  ${card.querySelector('ha-card > div > div > div.bubble-sub-button-container >
                  div.bubble-sub-button.bubble-sub-button-1 >
                  div.bubble-sub-button-name-container').innerText = 
                  hass.states['input_boolean.mode_jour_suite_parentale'].state === 'off' ? 'Mode Nuit' :
                  hass.states['input_boolean.mode_jour_suite_parentale'].state === 'on' ? 'Mode Jour' :
                  'Mode'}
                  
                  .bubble-sub-button-1.background-off {
                    background-color: ${hass.states['input_boolean.mode_jour_suite_parentale'].state === 'on' ? '#ffe85d' : hass.states['input_boolean.mode_jour_suite_parentale'].state === 'off' ? '#17153B' : 'default'} !important;
                    }
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_chambre_parentale
                - name_piece: Ch. Parents
                - input_select_modevolet: input_select.modevolet_chambre_parentale
                - input_select_homemodevolet: input_select.homemodevolet_chambre_parentale
            - type: custom:bubble-card
              card_type: empty-column
            - type: custom:decluttering-card
              template: volet_bubble_card
              variables:
                - entity_cover: cover.volet_salle_eau
                - name_piece: Salle d'eau
                - input_select_modevolet: input_select.modevolet_salle_eau
                - input_select_homemodevolet: input_select.homemodevolet_salle_eau                