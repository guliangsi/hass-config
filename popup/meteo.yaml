action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Météo
    size: fullscreen
    style: >
      --ha-card-border-radius: 0;
    card_mod:
      style:
        layout-card:
          $grid-layout$:
            # card divider border
            .: |
              #root {
                  margin: -24px 0 !important;
              }
            hui-entities-card:
              $: |
                .card-content {
                  padding: var(--tablet-popup-content-padding);
                  padding-bottom: 0.8em;
                }
                ha-card {
                  border-right: 1.5px solid rgba(0, 0, 0, 0.2);
                  border-radius: 0;
                  transition: none;
                }
                /* portrait */
                @media screen and (max-width: 1200px) {
                  ha-card {
                    border-right: none;
                    border-bottom: 1.5px solid rgba(0, 0, 0, 0.2);
                  }
                }
              $hui-horizontal-stack-card:
                # horizontal bottom buttons
                $: |
                  #root {
                    justify-content: space-evenly;
                    margin-top: 1.7em;
                    max-width: 82vw; /* iphonex */
                  }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        margin: 0
        grid-template-columns: 32% 2% 32% 2% 32%
        grid-template-rows: 1fr
        grid-template-areas: |
          "forecast . radar_pluie . radar_vent"
        mediaquery:
          #portrait
          "(max-width: 1200px)":
            grid-template-columns: 1fr
            grid-template-rows: repeat(3, 1fr)
            grid-template-areas: |
              "forecast"
              "radar"
              "infos"
      cards:
        - type: custom:meteofrance-weather-card
          view_layout:
            grid-area: forecast        
          entity: weather.forecast_maison
          number_of_forecasts: '5'
          current: true
          one_hour_forecast: true
          forecast: true
          details: true
          alert_forecast: true
          animated_icons: true
          name: Saint Martin de Saint Maixent
          

        - type: iframe
          view_layout:
            grid-area: radar_pluie        
          aspect_ratio: 60%
          url: >-
            https://embed.windy.com/embed2.html?lat=46.384&lon=-0.206&detailLat=46.335&detailLon=0.621&width=650&height=450&zoom=10&level=surface&overlay=rain&product=arome&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1

        - type: iframe
          view_layout:
            grid-area: radar_vent        
          aspect_ratio: 60%
          url: >-
            https://embed.windy.com/embed2.html?lat=46.384&lon=-0.206&detailLat=46.335&detailLon=0.621&width=650&height=450&zoom=10&level=surface&overlay=wind&product=arome&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1